<div class="min-vh-100 d-flex justify-content-center align-items-center bg-light">
<div class="card p-4 shadow" style="width: 25rem;">
  <h3 class="text-center mb-4">Iniciar Sesión</h3>
  
  <input type="text" name="username" class="form-control mb-3" 
         placeholder="Nombre de usuario" [(ngModel)]="credenciales.username">
  
  <input type="password" name="password" class="form-control mb-4" 
         placeholder="Contraseña" [(ngModel)]="credenciales.password">

  <button (click)="iniciarSesion()" class="btn btn-primary w-100">Entrar</button>
  
  <div class="text-center mt-3">
    <a routerLink="/register" class="text-decoration-none">¿No tienes cuenta? Regístrate aquí</a>
  </div>
</div>
